# SellMix — Nginx configuration
# Place at: /etc/nginx/sites-available/sellmix
# Then: sudo ln -s /etc/nginx/sites-available/sellmix /etc/nginx/sites-enabled/

# ─── Upstream Backend ─────────────────────────────────────────────────────────
upstream sellmix_api {
    server 127.0.0.1:5000;
    keepalive 64;
}

# ─── Rate limiting zones ───────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

# ─── sellmix.pk — Customer Web App ───────────────────────────────────────────
server {
    listen 80;
    server_name sellmix.pk www.sellmix.pk;

    root /var/www/sellmix/customer-web;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets (JS/CSS/images have content-hash filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA — all routes to index.html
    location / {
        try_files $uri /index.html;
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
    }

    # Proxy API calls to backend
    location /api {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://sellmix_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Proxy uploaded images (local uploads)
    location /uploads {
        proxy_pass http://sellmix_api;
        proxy_set_header Host $host;
        expires 7d;
    }
}

# ─── admin.sellmix.pk — Admin Dashboard ──────────────────────────────────────
server {
    listen 80;
    server_name admin.sellmix.pk;

    root /var/www/sellmix/web-frontend;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA routing
    location / {
        try_files $uri /index.html;
        add_header X-Frame-Options "DENY";
        add_header X-Content-Type-Options "nosniff";
    }

    # API proxy
    location /api {
        proxy_pass http://sellmix_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /uploads {
        proxy_pass http://sellmix_api;
        proxy_set_header Host $host;
    }
}

# ─── api.sellmix.pk — Backend API (for mobile app) ───────────────────────────
server {
    listen 80;
    server_name api.sellmix.pk;

    location / {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://sellmix_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
    }
}
